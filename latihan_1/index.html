<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 1</title>
    <link href="../bootstrap/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row mt-2">
            <div class="col-md-12 text-center">
                <h1>Latihan Javascript 1</h1>
            </div>
        </div>
        <div class="row mt-2 justify-content-center">
            <div class="col-md-12">
                <div class="input-group">
                    <label for="nama_depan" class="me-2">Nama depan : </label>
                    <input type="text" class="form-control" id="nama_depan" placeholder="Nama depan" aria-placeholder="Nama depan">
                </div>
            </div>
            <div class="col-md-12">
                <div class="input-group">
                    <label for="nama_belakang" class="me-2">Nama belakang : </label>
                    <input type="text" class="form-control" id="nama_belakang" placeholder="Nama belakang" aria-placeholder="Nama belakang">
                </div>
            </div>
        </div>
        <div class="row mt-2 justify-content-center">
            <div class="col-md-2">
                <button class="btn btn-primary" id="merge_button">Gabungkan</button>
            </div>
        </div>
        <div class="row mt-2 text-center">
            <span id="nama_lengkap">Nama lengkap</span>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="../bootstrap/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
